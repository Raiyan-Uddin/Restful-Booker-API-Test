# Restful Booker API Test Configuration

# API Configuration
api.base.url=https://restful-booker.herokuapp.com
api.booking.endpoint=/booking
api.auth.endpoint=/auth
api.ping.endpoint=/ping

# Request/Response Configuration
api.timeout.request=10
api.timeout.response=10

# Test Configuration
test.browser=chrome
test.headless=true
